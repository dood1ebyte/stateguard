name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Import Isolation
  # All other jobs depend on this passing.  Installs core ONLY (no pydantic)
  # so that any accidental import of pydantic in core/ is a hard failure.
  # -------------------------------------------------------------------------
  isolation:
    name: Import Isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core only (no optional deps, no pydantic)
        run: pip install -e . pytest

      - name: Verify pydantic is NOT installed in this environment
        run: python -c "import pydantic" && echo "FAIL — pydantic should not be installed" && exit 1 || echo "OK — pydantic not present"

      - name: Run isolation test suite
        run: pytest tests/isolation/ -v --tb=short

  # -------------------------------------------------------------------------
  # Job 2: Linting  (does not depend on isolation; runs in parallel)
  # -------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  # -------------------------------------------------------------------------
  # Job 3: Type Checking  (depends on isolation)
  # -------------------------------------------------------------------------
  typecheck:
    name: Type Check (mypy --strict)
    runs-on: ubuntu-latest
    needs: [isolation]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all deps (including pydantic for adapter type checking)
        run: pip install -e ".[pydantic,dev]"

      - name: Run mypy strict
        run: mypy src/

  # -------------------------------------------------------------------------
  # Job 4: Tests  (depends on isolation, matrix across OS x Python versions)
  #
  # Runs on both Linux and macOS to catch platform-specific regressions
  # (path handling, file I/O, encoding, etc.) automatically on every push.
  # Windows is intentionally not included yet — see M9_AUDIT.md and
  # M9_1_RELEASE_REPORT.md for the rationale (no known blockers, but not
  # yet verified, and out of scope for this stabilization pass).
  # -------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [isolation]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all deps
        run: pip install -e ".[pydantic,dev]"

      - name: Run unit + integration tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/isolation/ \
            -v \
            --tb=short \
            --cov=stateguard \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Run isolation tests again (pydantic IS installed — tests the other scenario)
        run: pytest tests/isolation/ -v --tb=short

      - name: CLI smoke test
        run: |
          echo '{"fields": [{"path": "x", "type": "string"}]}' > /tmp/schema.json
          echo '{"x": "hello"}' > /tmp/payload.json
          stateguard check --schema /tmp/schema.json --payload /tmp/payload.json

      - name: Benchmark harness smoke test
        run: python benchmarks/runner.py --no-write
